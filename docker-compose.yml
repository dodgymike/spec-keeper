services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-spec}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-spec}
      POSTGRES_DB: ${POSTGRES_DB:-specserver}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-spec} -d ${POSTGRES_DB:-specserver}"]
      interval: 5s
      timeout: 3s
      retries: 12
    ports:
      - "5432:5432"

  app:
    build: .
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-spec}:${POSTGRES_PASSWORD:-spec}@db:5432/${POSTGRES_DB:-specserver}
      LEASE_DEFAULT_TTL: ${LEASE_DEFAULT_TTL:-1800}
      API_KEYS: ${API_KEYS:-}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/readyz"]
      interval: 10s
      timeout: 3s
      retries: 6
    ports:
      - "8080:8080"

volumes:
  pgdata: {}
