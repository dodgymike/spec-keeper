name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      db:
        image: postgres:16
        env:
          POSTGRES_USER: spec
          POSTGRES_PASSWORD: spec
          POSTGRES_DB: specserver_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U spec -d specserver_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 12

    env:
      TEST_DATABASE_URL: postgresql+psycopg://spec:spec@localhost:5432/specserver_test

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest -q
