<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!--
      SEC-FIX-10 — travelling CSP baseline (defense-in-depth).
      The authoritative CSP is the CloudFront response header
      (infra/terraform/cloudfront.tf); this <meta> mirrors it so any path that
      serves the built SPA OUTSIDE that distribution (local/container preview,
      a direct-origin fetch) still runs with a Content-Security-Policy instead
      of none. It stays a subset-mirror of the edge policy — the edge header
      remains the source of truth. Directives that are ignored in <meta> form
      (frame-ancestors, upgrade-insecure-requests, sandbox) are intentionally
      omitted; only the edge header can enforce those.
      Origins allowed: the API (api.spec.elasticninja.com), the regional
      Cognito-IDP JSON endpoint (cognito-idp.eu-west-1.amazonaws.com, called
      directly from src/auth/cognito.ts), and Cloudflare Turnstile
      (challenges.cloudflare.com — script + widget iframe, src/lib/turnstile.ts).
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' https://challenges.cloudflare.com; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'self' https://api.spec.elasticninja.com https://cognito-idp.eu-west-1.amazonaws.com https://challenges.cloudflare.com; frame-src https://challenges.cloudflare.com; object-src 'none'; base-uri 'self'; form-action 'self'"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spec Server Dashboard</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
